name: Wallet Discovery Pipeline

on:
  # Schedule disabled — Supabase blocks GitHub Actions IPs.
  # Outcome tracker runs every 4h via Hetzner cron.
  # Discovery runs daily 03:00 UTC via Hetzner cron.
  # Keep workflow_dispatch for manual one-off runs if needed.
  workflow_dispatch:

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DATABASE_URL:       ${{ secrets.DATABASE_URL }}
      HELIUS_API_KEY:     ${{ secrets.HELIUS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests psycopg2-binary python-dotenv

      - name: Init DB schema + seed wallets (first run or when no tiers assigned)
        run: |
          python3 -m wallet_db.db
          python3 -c "
          from wallet_db.db import get_conn
          import subprocess, sys
          conn = get_conn()
          n_total  = conn.execute('SELECT COUNT(*) as n FROM wallets').fetchone()['n']
          n_tiered = conn.execute(\"SELECT COUNT(*) as n FROM wallets WHERE current_tier IS NOT NULL\").fetchone()['n']
          conn.close()
          print(f'Wallets in DB: {n_total}, tiered: {n_tiered}')
          if n_total == 0 or n_tiered == 0:
              print('Seeding: no tiered wallets found.')
              result = subprocess.run([sys.executable, '-m', 'wallet_db.seed'], capture_output=False)
              sys.exit(result.returncode)
          else:
              print('Tiered wallets already exist, skipping seed.')
          "

      - name: Token outcome tracker (Phase 2b)
        run: python3 -m wallet_db.outcome_tracker

      - name: Winner backtrace discovery (Phase 2c)
        run: python3 -m wallet_db.discovery backtrace

      - name: Multi-winner promotion (Phase 2d)
        if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
        run: python3 -m wallet_db.discovery promote
